services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_optimisation
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - optimisation_network

  api:
    build:
      context: ./serveur
      dockerfile: Dockerfile
    container_name: api_optimisation
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/optimisation
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - optimisation_network

networks:
  optimisation_network:
    driver: bridge

volumes:
  mongo_data:
