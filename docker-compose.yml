services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_optimisation
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - optimisation_network

  api:
    build:
      context: ./serveur
      dockerfile: Dockerfile
    container_name: api_optimisation
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/optimisation
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - optimisation_network

  k6:
    image: grafana/k6
    container_name: k6_benchmark
    volumes:
      - ./load-tests:/scripts
    environment:
      - API_URL=http://api:3001/api
    networks:
      - optimisation_network
    profiles: [test] # Ne se lance que sur demande explicite

networks:
  optimisation_network:
    driver: bridge

volumes:
  mongo_data:
